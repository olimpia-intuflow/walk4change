name: docker

on:
  push:
    branches: [main]
    paths: ["backend/**"]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to Azure App Service after build+push"
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: olimpia-intuflow/walk4change-api
  AZURE_WEBAPP_NAME: if-app-walk4change-prod-pl

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Krótki SHA do wdrożenia konkretnego, świeżo zbudowanego obrazu
      # (nie polegamy na "latest" przy deployu, żeby uniknąć race z cache).
      - name: Compute short SHA
        id: sha
        run: echo "short=$(echo "${{ github.sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      # Deploy na Azure App Service (Web App for Containers).
      # Zawsze przy push na main; przy ręcznym uruchomieniu tylko jeśli
      # input "deploy" jest true (domyślnie tak) — pozwala odpalić sam
      # build+push bez deployu (np. do testu obrazu).
      - name: Deploy to Azure App Service
        if: ${{ github.event_name == 'push' || inputs.deploy }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short }}
